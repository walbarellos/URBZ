<!-- ========================================================================================
🌿 logout.html – Confirmação de Saída • Agroverso
🔐 Página institucional pós-logout com clareza emocional e retorno acessível à página inicial
💡 Refinado com sabedoria, força e beleza. Imagem de fundo aplicada com perfeição regenerativa.
======================================================================================== -->
<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="IE=edge" http-equiv="X-UA-Compatible"/>
<title>Sessão Encerrada • Agroverso</title>
<meta content="noindex, nofollow" name="robots"/>
<meta content="Sessão finalizada com sucesso no sistema Agroverso. Retorne à página inicial com sabedoria, força e beleza." name="description"/>
<!-- 🎨 Folhas de estilo externas -->
<link href="assets/css/estilos.css" rel="stylesheet"/>
<link href="assets/css/login.css" rel="stylesheet"/>
<link href="assets/images/favicon.ico" rel="icon" type="image/x-icon"/>
<!-- 🎨 Estilo específico com plano de fundo e refinamento -->
<style>
    body.login-body {
      background-image: url('assets/images/background-logout.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    main.logout-confirmacao {
      min-height: 100vh;
      background-color: rgba(255, 255, 255, 0.8); /* Transparência leve para legibilidade */
      text-align: center;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logout-mensagem {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #1C3D27;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.15);
    }

    .logout-subtexto {
      font-size: 1.15rem;
      margin-bottom: 2.5rem;
      color: #333;
      line-height: 1.6;
    }

    .icone-voltar {
      width: 36px;
      height: 36px;
      margin-right: 0.6rem;
      vertical-align: middle;
    }

    .btn-voltar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.5rem;
      background-color: transparent;
      border: 2px solid #1C3D27;
      border-radius: 8px;
      font-weight: bold;
      color: #1C3D27;
      text-decoration: none;
      font-size: 1.05rem;
      transition: all 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .btn-voltar:hover {
      background-color: #1C3D27;
      color: white;
      transform: scale(1.02);
    }
  </style>
</head>
<body class="login-body">
<main aria-label="Sessão encerrada com sucesso" class="logout-confirmacao" role="main">
<h1 class="logout-mensagem">### Resultado:</h1>
<p class="logout-subtexto">&gt; https://www.tally.xyz/gov/urbz *(link oficial pós-validação)*</p>
<!-- 🔙 Botão de retorno -->
<a aria-label="Voltar para a Página Inicial" class="btn-voltar" href="index.html">
<img alt="Voltar" class="icone-voltar" src="assets/images/logo-512.png"/>
      Voltar para a Página Inicial
    </a>
</main>
</body>
</html>
