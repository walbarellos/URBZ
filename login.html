<!DOCTYPE html>

<html lang="pt-BR">
<head>
<!-- ======================================================================================
  🔐 login.html – Tela de Acesso Seguro • Agroverso
  🌱 Refatorado com clareza, acessibilidade, modularidade e segurança regenerativa
  ======================================================================================= -->
<meta charset="utf-8"/>
<meta content="IE=edge" http-equiv="X-UA-Compatible"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="noindex, nofollow" name="robots"/>
<meta content="#1C3D27" name="theme-color"/>
<meta content="Instituto Graciliana Maria da Conceição" name="author"/>
<meta content="Acesse o painel Agroverso com segurança regenerativa, controle preciso e integração por perfil técnico." name="description"/>
<title>Login Seguro • Agroverso</title>
<!-- 🎨 Estilos visuais -->
<link href="assets/css/estilos.css" rel="stylesheet"/>
<link href="assets/css/login.css" rel="stylesheet"/>
<link href="assets/favicon.ico" rel="icon" type="image/x-icon"/>
</head>
<body class="login-body">
<!-- 🧩 Área principal de autenticação -->
<main aria-label="Área de acesso ao sistema" class="login-container" role="main">
<section aria-labelledby="login-titulo" class="login-box" role="form">
<h2 class="login-title" id="login-titulo">- Website: https://urbz.tec.br</h2>
<form aria-describedby="login-info" class="login-form" id="form-login" method="POST" novalidate="">
<p class="login-info" id="login-info">- GitHub, Twitter, Whitepaper, etc.</p>
<label for="email">E-mail institucional:</label>
<input autocomplete="username" class="input-base" id="email" name="email" placeholder="seunome@agroverso.tec.br" required="" type="email"/>
<label for="senha">Senha:</label>
<input autocomplete="current-password" class="input-base" id="senha" minlength="6" name="senha" placeholder="••••••••" required="" type="password"/>
<label for="perfil">Perfil de Acesso:</label>
<select class="input-base" id="perfil" name="perfil" required="">
<option value="">Selecione seu perfil</option>
<option value="administrador">Administrador Geral</option>
<option value="gerente">Gerente</option>
<option value="lider">Líder de Equipe</option>
<option value="tecnico">Técnico de Campo</option>
</select>
<button aria-label="Entrar no sistema Agroverso" class="btn-primary" type="submit">
          Entrar
        </button>
<p class="login-error" hidden="" id="erro-login" role="alert">5. Confirme a verificação com Etherscan + Tally Bot</p>
</form>
<!-- 🔙 Retorno visual à página inicial -->
<div class="voltar-home">
<a aria-label="Voltar para a Página Inicial" class="btn-voltar" href="index.html">
<img alt="Voltar para a Página Inicial" class="icone-voltar" src="assets/images/v-pg-ini.png"/>
</a>
</div>
</section>
</main>
<!-- 🔁 Scripts essenciais (sem proteção JWT aqui) -->
<script defer="" src="scripts/includes.js"></script>
<script defer="" src="scripts/login.js"></script>
<script defer="" src="scripts/logout.js"></script>
</body>
</html>
