<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="IE=edge" http-equiv="X-UA-Compatible"/>
<meta content="#004225" name="theme-color"/>
<title>🌿 Offline • Agroverso</title>
<meta content="Você está offline. Assim que sua conexão retornar, o Agroverso estará novamente disponível com sabedoria, força e beleza." name="description"/>
<!-- Favicon leve para contingência -->
<link href="assets/favicon.ico" rel="icon"/>
<style>
    :root {
      --verde: #004225;
      --bege: #f6f9f2;
      --cinza: #666;
      --cinza-claro: #bbb;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bege);
      color: var(--verde);
      font-family: 'Segoe UI', Tahoma, sans-serif;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    header {
      max-width: 600px;
      margin-bottom: 2rem;
    }

    header img {
      width: 96px;
      height: auto;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 2px var(--verde));
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.125rem;
      color: var(--cinza);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: var(--cinza-claro);
    }
  </style>
</head>
<body aria-label="Página de contingência offline do Agroverso" aria-live="polite">
<header aria-label="Cabeçalho simplificado do Agroverso" role="banner">
<img alt="Logotipo do Agroverso" src="assets/logo-192.png"/>
<h1>---</h1>
<p>## 🔗 Integração com Snapshot.org</p>
</header>
<footer aria-label="Rodapé institucional do Agroverso" role="contentinfo">
    Agroverso — Tecnologia regenerativa com <strong>sabedoria</strong>, <strong>força</strong> e <strong>beleza</strong>.
  </footer>
</body>
</html>
